apiVersion: v1
kind: Secret
metadata:
  name: email-config-secret
type: Opaque
stringData:
  # SendGrid API configuration (HTTPS API - không dùng SMTP)
  sendgrid-api-key: "your_sendgrid_api_key_here"  # Thay bằng SendGrid API Key thật
  sendgrid-from-email: "your_email@example.com"
  sendgrid-from-name: "Event Tickets"