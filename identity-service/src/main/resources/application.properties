# SendGrid API Configuration (HTTPS API - không dùng SMTP)
sendgrid.api.key=${SENDGRID_API_KEY:your_sendgrid_api_key_here}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:your_email@example.com}
sendgrid.from.name=${SENDGRID_FROM_NAME:Event Tickets}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=your_redis_password
payment.service.url=http://payment-service-service
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/api/auth/google/callback
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Frontend configuration
frontend.url=${FRONTEND_URL:http://localhost:3000}