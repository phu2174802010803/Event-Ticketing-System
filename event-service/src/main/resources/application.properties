spring.application.name=event-service
spring.datasource.url=jdbc:postgresql://my-pg-flex-server.postgres.database.azure.com:5432/event_db?sslmode=require
spring.datasource.username=pgadmin
spring.datasource.password=Demo@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8083
server.http2.enabled=true
spring.data.redis.host=68.183.179.182
spring.data.redis.port=6379
spring.data.redis.password=9999
identity.service.url=http://identity-service-service
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.kafka.bootstrap-servers=146.190.95.235:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=event-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.eventservice.dto,com.example.ticketservice.dto
spring.kafka.consumer.properties.spring.json.type.mapping=ticketevent:com.example.eventservice.dto.TicketUpdateEvent,phaseevent:com.example.eventservice.dto.PhaseUpdateEvent
logging.level.org.springframework.web=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.com.example.eventservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE